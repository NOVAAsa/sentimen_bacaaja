<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Insight Engine PT bacaaja.co</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Inter', sans-serif;
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(255, 117, 140, 0.1); 
            width: 100%;
            max-width: 400px; 
            border: 1px solid rgba(255, 117, 140, 0.1);
        }
        .brand-logo {
            font-size: 2rem;
            color: #ff758c;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            height: auto;
            border: 2px solid #f1f5f9;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #ff758c;
            box-shadow: none;
        }
        .btn-pink { 
            background: #ff758c; 
            color: white; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: bold; 
            padding: 12px;
            border: none;
            transition: 0.3s;
        }
        .btn-pink:hover { 
            background: #ff5e78; 
            transform: translateY(-2px);
            color: white;
        }
        .info-box {
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="brand-logo">
            <i class="fas fa-brain"></i>
        </div>
        <h3 class="font-weight-bold" style="color: #334155;">Insight Engine</h3>
        <p class="text-muted small mb-4">Silakan masuk untuk mengelola sentimen</p>
        
        <form action="/login" method="post">
            <div class="text-left mb-3">
                <label class="small font-weight-bold text-muted">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin atau user" required>
            </div>
            <div class="text-left mb-4">
                <label class="small font-weight-bold text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-pink mb-4">
                Masuk ke Dashboard <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="info-box">
            <i class="fas fa-info-circle mr-1"></i> Akun Demo: <b>admin</b> atau <b>user</b>
        </div>
        
        <p class="mt-4 small text-muted">&copy; 2026 PT bacaaja.co</p>
    </div>
</body>
</html>
